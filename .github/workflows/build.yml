name: Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: ['*', '*/*', '**']

jobs:
  windows:
    name: windows-${{ matrix.arch }}-${{ matrix.config }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64]
        config: [Release, Debug]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Declare github variables
        id: vars
        shell: bash
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Map arch to -A flag
        id: arch
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "x86" ]; then
            echo "cmake_arch=Win32" >> "$GITHUB_OUTPUT"
          else
            echo "cmake_arch=x64" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            -G "Visual Studio 17 2022" \
            -A ${{ steps.arch.outputs.cmake_arch }} \
            -DCA_ARCH=${{ matrix.arch }} \
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.config }} --target colandreas -j

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: colandreas-windows-${{ matrix.arch }}-${{ matrix.config }}-${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.sha_short }}
          path: build/bin/${{ matrix.config }}/colandreas.dll
          if-no-files-found: error

  linux:
    name: linux-${{ matrix.arch }}-${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64]
        config: [Release, Debug]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Declare github variables
        id: vars
        shell: bash
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Install toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build
          if [ "${{ matrix.arch }}" = "x86" ]; then
            sudo apt-get install -y gcc-multilib g++-multilib libstdc++6:i386 libc6-dev-i386
          fi

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCA_ARCH=${{ matrix.arch }} \
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Build
        run: cmake --build build --target colandreas -j

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: colandreas-linux-${{ matrix.arch }}-${{ matrix.config }}-${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.sha_short }}
          path: build/bin/colandreas.so
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag="${GITHUB_REF#refs/tags/}"
          mkdir -p dist

          # Prefer the include shipped under Server/include if present (upstream layout),
          # otherwise fall back to a top-level colandreas.inc if the port ever grows one.
          inc_src=""
          if [ -f Server/include/colandreas.inc ]; then
            inc_src=Server/include/colandreas.inc
          elif [ -f colandreas.inc ]; then
            inc_src=colandreas.inc
          fi

          package_one() {
            local os="$1" arch="$2" binary="$3"
            local src_glob="artifacts/colandreas-${os}-${arch}-Release-*"
            local src=( $src_glob )
            if [ ${#src[@]} -eq 0 ]; then
              echo "::error::No Release artifact found for ${os}-${arch}"
              exit 1
            fi

            local stage="pack/colandreas-${os}-${arch}"
            rm -rf "$stage"
            mkdir -p "$stage"
            cp "${src[0]}/${binary}" "$stage/"
            [ -n "$inc_src" ] && cp "$inc_src" "$stage/"
            cp readme.md License.txt "$stage/" 2>/dev/null || true

            (cd pack && zip -r "../dist/colandreas-${tag}-${os}-${arch}.zip" "colandreas-${os}-${arch}")
          }

          package_one windows x86 colandreas.dll
          package_one windows x64 colandreas.dll
          package_one linux   x86 colandreas.so
          package_one linux   x64 colandreas.so

          ls -lh dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
